name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build and Publish
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish App
      run: |
        dotnet publish FinanceWidget.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:PublishReadyToRun=true -o ./publish

    - name: Get Version
      id: get_version
      shell: pwsh
      run: |
        $version = (Select-String -Path FinanceWidget.csproj -Pattern '<Version>(.*)</Version>').Matches.Groups[1].Value
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT

    - name: Zip Release
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath ./FinanceWidget-v${{ steps.get_version.outputs.VERSION }}-win-x64.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
      with:
        files: ./FinanceWidget-v${{ steps.get_version.outputs.VERSION }}-win-x64.zip
        tag_name: v${{ steps.get_version.outputs.VERSION }}
        name: Release v${{ steps.get_version.outputs.VERSION }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
